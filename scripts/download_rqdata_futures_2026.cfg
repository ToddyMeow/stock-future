[download]
start_date = 2018-01-01
end_date = 2026-04-18
frequency = 1d
fields = open, high, low, close, settlement, volume, open_interest
raw_output_dir = data/cache/raw_rqdata_2026
normalized_output_base = data/cache/normalized/hab_bars_2026_full
write_csv = true
write_parquet = false
overwrite = true

[adapter]
default_slippage_override =
drop_zero_volume_rows = false

[discovery]
auto_discover_underlyings = true
date = 2026-04-18
exchanges =
include_underlyings = A,AD,AG,AL,AO,AP,AU,B,BB,BC,BR,BU,BZ,C,CF,CJ,CS,CU,CY,EB,EC,EG,FB,FG,FU,HC,I,IC,IF,IH,IM,J,JD,JM,JR,L,LC,LG,LH,LR,LU,L_F,M,MA,NI,NR,OI,OP,P,PB,PD,PF,PG,PK,PL,PM,PP,PP_F,PR,PS,PT,PX,RB,RI,RM,RR,RS,RU,SA,SC,SF,SH,SI,SM,SN,SP,SR,SS,T,TA,TF,TL,TS,UR,V,V_F,WH,WR,Y,ZC,ZN
exclude_underlyings =
kind = dominant
variants = none, pre
normalize = true
normalize_variant = pre

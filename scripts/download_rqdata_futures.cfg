[download]
start_date = 2018-01-01
end_date = 2026-01-01
frequency = 1d
fields = open, high, low, close, volume, open_interest
raw_output_dir = data/cache/raw_rqdata
normalized_output_base = data/cache/normalized/hab_bars
write_csv = true
write_parquet = true
overwrite = false

[adapter]
default_slippage_override =
drop_zero_volume_rows = false

[job:cu_contract]
kind = contract
order_book_id = CU2506
underlying_symbol = CU
strategy_symbol = CU2506
normalize = false

[job:cu_dominant]
kind = dominant
underlying_symbol = CU
strategy_symbol = CU
variants = none, pre
normalize = true
normalize_variant = pre

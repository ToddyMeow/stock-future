[download]
start_date = 2018-01-01
end_date = 2026-01-01
frequency = 1d
fields = open, high, low, close, settlement, volume, open_interest
raw_output_dir = data/cache/raw_rqdata
normalized_output_base = data/cache/normalized/hab_bars
write_csv = true
write_parquet = false
overwrite = true

[adapter]
default_slippage_override =
drop_zero_volume_rows = false

[discovery]
auto_discover_underlyings = true
date = 2026-01-01
exchanges =
include_underlyings =
exclude_underlyings =
kind = dominant
variants = none, pre
normalize = true
normalize_variant = pre

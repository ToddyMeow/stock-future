# ─────────────────────────────────────────────────────────────
# Strategy Config — 所有策略超参数的唯一来源
# ─────────────────────────────────────────────────────────────

# 数据路径
data:
  hab_bars_path: "data/cache/normalized/hab_bars.csv"
  data_quality_mode: "clamp"   # clamp / drop / strict

# ── 引擎 (StrategyEngine) ──────────────────────────────────
engine:
  initial_capital: 1_000_000
  atr_period: 20

  # R = stop_atr_mult × ATR(atr_period)
  stop_atr_mult: 2.0

  # 风控
  risk_per_trade: 0.02
  portfolio_risk_cap: 0.15
  group_risk_cap:
    equity_index: 0.04
    bond: 0.04
    chem_energy: 0.06
    rubber_fiber: 0.06
    metals: 0.06
    black_steel: 0.06
    agri: 0.06
    building: 0.05
    livestock: 0.04
  default_group_risk_cap: 0.02
  independent_group_soft_cap: 0.08
  max_portfolio_leverage: 3.0
  default_margin_rate: 0.10

  # 填充机制
  risk_blowout_cap: 1.5
  risk_blowout_action: "SHRINK"
  allow_short: false

# ── 策略组合 ──────────────────────────────────────────────
# 每个 strategy 是一个入场+出场配对，共享引擎资金池
strategies:
  - id: "hab"
    entry:
      type: "hab"
      hab:
        bb_period: 20
        bb_std: 2.0
        bb_percentile_lookback: 60
        bb_percentile_threshold: 0.30
        box_lookback: 7
        box_width_atr_mult: 1.5
        tol_atr_mult: 0.25
        breakout_atr_mult: 0.5
        upper_shadow_ratio_max: 0.25
        initial_stop_atr_mult: 1
    exit:
      type: "hab"
      hab:
        structure_fail_bars: 15
        structure_fail_mode: "CLOSE_BELOW_BOX_MINUS_ATR"
        structure_fail_atr_buffer: 0.5
        structure_fail_consecutive: 2
        time_fail_bars: 15
        time_fail_target_r: 0.3
        trail_activate_r: 1.0
        trail_atr_mult: 2.0

  - id: "donchian"
    entry:
      type: "donchian"
      donchian:
        donchian_period: 20
        initial_stop_atr_mult: 2.0
    exit:
      type: "hab"
      hab:
        structure_fail_bars: 15
        structure_fail_mode: "CLOSE_BELOW_BOX_MINUS_ATR"
        structure_fail_atr_buffer: 0.5
        structure_fail_consecutive: 2
        time_fail_bars: 15
        time_fail_target_r: 0.3
        trail_activate_r: 1.0
        trail_atr_mult: 2.0
